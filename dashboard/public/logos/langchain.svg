<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- LangChain parrot-inspired icon in brand green -->
  <defs>
    <linearGradient id="lcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C3C3C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2D9B6E;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="90" fill="url(#lcGrad)"/>
  <!-- Stylized chain links -->
  <g fill="none" stroke="white" stroke-width="6" stroke-linecap="round">
    <!-- Top chain link -->
    <rect x="60" y="45" width="35" height="22" rx="11" ry="11"/>
    <!-- Middle chain link -->
    <rect x="82" y="62" width="35" height="22" rx="11" ry="11"/>
    <!-- Bottom chain link -->
    <rect x="60" y="79" width="35" height="22" rx="11" ry="11"/>
    <!-- Extra link -->
    <rect x="82" y="96" width="35" height="22" rx="11" ry="11"/>
  </g>
  <!-- Parrot head silhouette -->
  <g fill="white">
    <ellipse cx="100" cy="130" rx="28" ry="20"/>
    <ellipse cx="120" cy="120" rx="12" ry="16"/>
    <!-- Beak -->
    <polygon points="132,122 148,128 132,132"/>
    <!-- Eye -->
    <circle cx="126" cy="120" r="3" fill="#1C3C3C"/>
  </g>
  <text x="100" y="175" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">LangChain</text>
</svg>